syntax = "proto3";

package skillchain.job;

import "gogoproto/gogo.proto";

option go_package = "github.com/SkillChainLab/skillchain/x/job/types";

// Job defines a job listing
message Job {
  uint64 id = 1;
  string creator = 2;
  string title = 3;
  string description = 4;
  string budget = 5;
}
